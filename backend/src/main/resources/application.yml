server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: zup
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/zup}
    username: ${SPRING_DATASOURCE_USERNAME:zup}
    password: ${SPRING_DATASOURCE_PASSWORD:zup}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      repositories:
        enabled: false
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    open-in-view: false

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  collection:
    scheduler:
      enabled: ${COLLECTION_SCHEDULER_ENABLED:false}
      fixed-delay-ms: ${COLLECTION_SCHEDULER_FIXED_DELAY_MS:60000}
      batch-size: ${COLLECTION_SCHEDULER_BATCH_SIZE:5}
      lock-ttl-seconds: ${COLLECTION_SCHEDULER_LOCK_TTL_SECONDS:120}
      default-fetch-interval-minutes: ${COLLECTION_DEFAULT_FETCH_INTERVAL_MINUTES:1440}
      failure-retry-minutes: ${COLLECTION_FAILURE_RETRY_MINUTES:180}
  admin:
    email: ${ADMIN_EMAIL:admin@zup.local}
    password: ${ADMIN_PASSWORD:admin1234}
  jwt:
    secret: ${JWT_SECRET:change-this-secret-key-for-local-development}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}
