services:
  postgres:
    image: postgres:16-alpine
    container_name: zup-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zup}
      POSTGRES_USER: ${POSTGRES_USER:-zup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zup}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: zup-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    container_name: zup-backend
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-zup}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-zup}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-zup}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

  frontend:
    container_name: zup-frontend
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
